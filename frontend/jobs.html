<!DOCTYPE html>
<html>
<head>
    <title>Create Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">

<h2 class="text-xl mb-4">Create Job</h2>

<input id="title" placeholder="Title" class="border p-2 mb-2 block">
<textarea id="desc" placeholder="Description" class="border p-2 mb-2 block"></textarea>
<input id="must" placeholder="Must Have (comma separated)" class="border p-2 mb-2 block">
<input id="good" placeholder="Good To Have" class="border p-2 mb-2 block">

<button onclick="createJob()" class="bg-green-500 text-white px-4 py-2 rounded">Create</button>

<p id="status"></p>

<script src="js/jobs.js"></script>

</body>
</html>
