services:
  db:
    image: postgres:15
    container_name: ats_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ats_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ats_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ats_db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: ats_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: